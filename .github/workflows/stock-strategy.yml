name: 股票策略定时执行

on:
  schedule:
    # 北京时间21:00 = UTC 13:00 (夏令时) 或 13:00 (冬令时)
    # 周一到周五每天执行
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        # 验证 pyarrow 安装
        python -c "import pyarrow; print(f'pyarrow version: {pyarrow.__version__}')"
    
    - name: 获取当前日期
      id: date
      run: |
        echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        echo " Trading date: $(date +'%Y-%m-%d %H:%M:%S')"
    
    - name: 运行股票策略
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        DB_PATH: ${{ github.workspace }}/stock_strategy.db
        CACHE_DIR: ${{ github.workspace }}/data_cache
      run: |
        echo "========================================"
        echo "开始执行股票策略分析"
        echo "日期: ${{ steps.date.outputs.today }}"
        echo "========================================"
        python main_par2.py --date ${{ steps.date.outputs.today }} --backtest --hold-days 3
    
    - name: 生成报告索引
      run: python generate_reports_json.py
    
    - name: 提交生成的文件到仓库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add html/ reports.json index.html
        git diff --staged --quiet || git commit -m "Auto-commit: Update reports for ${{ steps.date.outputs.today }}"
        git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
    
    - name: 上传结果文件
      uses: actions/upload-artifact@v4
      if: always()  # 即使失败也上传
      with:
        name: strategy-results-${{ steps.date.outputs.today }}
        path: |
          result.csv
          *.csv
          *.html
          *.json
          stock_strategy.db
        retention-days: 30  # 保留30天
    
    - name: 上传日志文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: strategy-logs-${{ steps.date.outputs.today }}
        path: |
          *.log
        retention-days: 7

  # 邮件通知
  notify:
    needs: run-strategy
    runs-on: ubuntu-latest
    if: always()  # 无论成功失败都通知
    
    steps:
    - name: 发送邮件通知
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.qq.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        secure: true
        subject: "📊 股票策略执行完成 - ${{ needs.run-strategy.result }}"
        to: ${{ secrets.EMAIL_USERNAME }}
        from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
        html_body: |
          <h2>📊 股票策略执行通知</h2>
          <p><strong>执行状态:</strong> ${{ needs.run-strategy.result }}</p>
          <p><strong>执行时间:</strong> ${{ github.event.repository.updated_at }}</p>
          <p><strong>仓库:</strong> ${{ github.repository }}</p>
          <p><strong>分支:</strong> ${{ github.ref }}</p>
          <hr>
          <p>📈 <a href="https://zxlin96.github.io/wbzq/">查看选股报告</a></p>
          <p>🔍 <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看执行详情</a></p>
          <hr>
          <p style="color: #666; font-size: 12px;">此邮件由 GitHub Actions 自动发送</p>
