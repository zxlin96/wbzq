name: 股票策略定时执行

on:
  schedule:
    # 北京时间21:30 = UTC 13:30 (夏令时) 或 13:30 (冬令时)
    # 周一到周五每天执行
    - cron: '30 13 * * 1-5'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main, master ]  # 推送到主分支时也运行测试

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库内容
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，用于提交缓存数据
    
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir -r requirements.txt
        # 验证 pyarrow 安装
        python -c "import pyarrow; print(f'pyarrow version: {pyarrow.__version__}')"
    
    - name: 获取当前日期
      id: date
      run: |
        echo "today=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        echo " Trading date: $(date +'%Y-%m-%d %H:%M:%S')"
    
    - name: 运行股票策略
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        DB_PATH: ${{ github.workspace }}/stock_strategy.db
        CACHE_DIR: ${{ github.workspace }}/data_cache
      run: |
        echo "========================================"
        echo "开始执行股票策略分析"
        echo "日期: ${{ steps.date.outputs.today }}"
        echo "========================================"
        python main_par2.py --date ${{ steps.date.outputs.today }} --backtest --hold-days 3
    
    - name: 上传结果文件
      uses: actions/upload-artifact@v4
      if: always()  # 即使失败也上传
      with:
        name: strategy-results-${{ steps.date.outputs.today }}
        path: |
          result.csv
          *.csv
          *.html
          stock_strategy.db
        retention-days: 30  # 保留30天
    
    - name: 上传日志文件
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: strategy-logs-${{ steps.date.outputs.today }}
        path: |
          *.log
        retention-days: 7
    
    - name: 提交并推送缓存数据
      if: success()  # 只有成功时才提交缓存
      run: |
        echo "========================================"
        echo "检查并提交缓存数据"
        echo "========================================"
        
        # 配置 Git 用户信息
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 检查 data_cache 目录是否有变更
        if [ -d "data_cache" ]; then
          echo "发现 data_cache 目录"
          
          # 添加 data_cache 目录（确保 .gitignore 允许）
          git add data_cache/
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "缓存数据没有变化，无需提交"
          else
            echo "发现新的缓存数据，正在提交..."
            git commit -m "Update cache data [$(date +'%Y-%m-%d %H:%M:%S')]"
            
            # 推送变更
            git push
            echo "✅ 缓存数据已推送到仓库"
          fi
        else
          echo "data_cache 目录不存在"
        fi
    
    - name: 显示缓存统计
      if: success()
      run: |
        echo "========================================"
        echo "缓存数据统计"
        echo "========================================"
        if [ -d "data_cache" ]; then
          echo "缓存文件数量: $(find data_cache -type f | wc -l)"
          echo "缓存目录大小: $(du -sh data_cache | cut -f1)"
          echo ""
          echo "最近更新的文件:"
          ls -lt data_cache/ | head -10
        else
          echo "data_cache 目录不存在"
        fi

  # 可选：发送通知（需要配置钉钉/企业微信等）
  notify:
    needs: run-strategy
    runs-on: ubuntu-latest
    if: always()  # 无论成功失败都通知
    
    steps:
    - name: 发送执行结果通知
      run: |
        echo "策略执行完成"
        echo "状态: ${{ needs.run-strategy.result }}"
        # 这里可以添加钉钉/企业微信通知脚本
