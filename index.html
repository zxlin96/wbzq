<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票策略分析报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- 标题 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">📊 股票策略分析报告</h1>
            <p class="text-gray-600">每日自动更新 | 基于 Tushare 数据</p>
            <p class="text-sm text-gray-500 mt-2">最后更新时间: <span id="lastUpdate">加载中...</span></p>
        </div>

        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-blue-100 rounded-full mr-4">
                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">选股总数</div>
                        <div class="text-2xl font-bold text-blue-600" id="totalStocks">-</div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-green-100 rounded-full mr-4">
                        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">报告数量</div>
                        <div class="text-2xl font-bold text-green-600" id="totalReports">-</div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center">
                    <div class="p-3 bg-purple-100 rounded-full mr-4">
                        <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500">最新日期</div>
                        <div class="text-2xl font-bold text-purple-600" id="latestDate">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 报告列表 -->
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">📋 历史报告</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th class="px-6 py-3">日期</th>
                            <th class="px-6 py-3">选股结果</th>
                            <th class="px-6 py-3">行业趋势</th>
                            <th class="px-6 py-3">J13趋势</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="reportList">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="text-center mt-8 text-gray-500 text-sm">
            <p>自动部署 | GitHub Actions | 每日 21:30 (北京时间) 更新</p>
        </div>
    </div>

    <script>
        async function loadReports() {
            try {
                const response = await fetch('reports.json');
                if (!response.ok) throw new Error('加载失败');
                
                const data = await response.json();
                
                document.getElementById('lastUpdate').textContent = data.lastUpdate;
                document.getElementById('totalStocks').textContent = data.totalStocks;
                document.getElementById('totalReports').textContent = data.reports.length;
                document.getElementById('latestDate').textContent = data.latestDate;
                
                const tbody = document.getElementById('reportList');
                tbody.innerHTML = data.reports.map(report => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 font-medium text-gray-900">${report.date}</td>
                        <td class="px-6 py-4">
                            <a href="${report.stockSelection}" target="_blank" 
                               class="text-blue-600 hover:text-blue-800 font-medium">
                                查看选股
                            </a>
                        </td>
                        <td class="px-6 py-4">
                            ${report.industryTrend 
                                ? `<a href="${report.industryTrend}" target="_blank" class="text-green-600 hover:text-green-800 font-medium">查看趋势</a>`
                                : `<span class="text-gray-400">暂无</span>`
                            }
                        </td>
                        <td class="px-6 py-4">
                            ${report.j13Trend 
                                ? `<a href="${report.j13Trend}" target="_blank" class="text-purple-600 hover:text-purple-800 font-medium">查看J13</a>`
                                : `<span class="text-gray-400">暂无</span>`
                            }
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                document.getElementById('reportList').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-8 text-center text-red-500">
                            加载报告列表失败: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadReports);
    </script>
</body>
</html>
